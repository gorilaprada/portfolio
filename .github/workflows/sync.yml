name: Sync GitHub Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: data

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run sync script
        run: node scripts/sync-github.js
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Commit and push
        run: |
          git config user.email "bot@portfolio.com"
          git config user.name "sync-bot"
          git add data.json
          git diff --staged --quiet || git commit -m "sync"
          git push
