<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gorilaprada | Portfolio</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="terminal-container">
    <pre id="ascii"></pre>

    <div class="titlebar">
      <span class="dot dot-close"></span>
      <span class="dot dot-min"></span>
      <span class="dot dot-max"></span>
      <span class="titlebar-label">gorilaprada — portfolio</span>
    </div>

    <div class="terminal-body" id="menu-view">
      <p class="terminal-output" id="output"></p>
      <p class="terminal-prompt">select an option:</p>
      <div class="menu">
        <button class="menu-btn" data-option="1"><span class="bracket">[1]</span> projects</button>
        <button class="menu-btn" data-option="2"><span class="bracket">[2]</span> coding streak</button>
        <button class="menu-btn" data-option="3"><span class="bracket">[3]</span> contact</button>
      </div>
    </div>

    <div class="terminal-body" id="content-view" tabindex="0" style="display: none;">
      <button class="menu-btn" id="back-btn"><span class="bracket">[0]</span> menu</button>
      <div id="content-output"></div>
    </div>
  </div>

  <video id="videoSource" loop muted playsinline hidden>
    <source src="./img/video.mp4" type="video/mp4">
  </video>

  <div class="scanline"></div>

 <script src="./script.js"></script>
</body>

</html>
